  - aid: sst-dev:sst-console
    name: SST Console
    description: 'SST Console is a hosted SaaS dashboard at console.sst.dev that connects to SST apps deployed to AWS.
      It surfaces CloudWatch logs, real-time issue detection for Node.js Lambdas and containers (with source maps and
      Slack/email alerts), per-update permalinks showing resource diffs and build logs, autodeploy from GitHub branches
      and pull requests, live `sst dev` session logs, and full resource visibility. The Console only supports apps
      deployed to AWS today. Personal stages are free; production-tier workspaces above 350 active resources are billed
      per resource per month.'
    humanURL: https://sst.dev/docs/console
