apis:
  - aid: sst-dev:sst-framework
    name: SST Framework
    description: 'The SST framework is an open source CLI and component library distributed via npm (`sst`) and as a
      Go-based CLI. Developers describe their full-stack application in a single `sst.config.ts` file using SST
      components (e.g. `sst.aws.Function`, `sst.aws.Bucket`, `sst.aws.Nextjs`, `sst.cloudflare.Worker`) plus any of the
      150+ Pulumi/Terraform providers. The CLI (`sst init`, `sst dev`, `sst deploy`, `sst diff`, `sst remove`,
      `sst secret`, `sst shell`, `sst tunnel`, `sst refresh`, `sst state`) drives local development with live Lambda
      tunneling and production deployment with stage namespacing. The SDK exposes linked resources at runtime so app
      code never hardcodes infrastructure identifiers.'
    humanURL: https://sst.dev/docs
