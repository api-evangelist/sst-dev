aid: sst-dev
name: SST
description: SST is an open source TypeScript framework for building full-stack applications on your own infrastructure.
  Originally known as Serverless Stack, it now ships as a single `sst.config.ts` file that uses Pulumi and Terraform
  providers under the hood to deploy components across AWS, Cloudflare, and 150+ other providers. SST covers Lambda
  functions, containers, queues, buckets, databases, cron jobs, and front-end frameworks like Next.js, Remix, Astro,
  and SvelteKit, with resource linking that wires components together without hardcoded ARNs. SST Console adds a
  hosted dashboard for logs, issues, deployments, and autodeploy from Git.
